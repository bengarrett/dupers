# https://taskfile.dev
#
# Clean, simplified Taskfile for dupers
# Focuses on essential development and testing workflows
version: "3"

vars:
  FILE: ./testdata/files_to_check/qziD6WMRvPyk
  TEST_DIR: ./.task_test
  TEST_DATA: ./testdata/
  RUNRACE: run -race main.go

tasks:
  default:
    # --list only shows tasks without descriptions
    cmds:
      - task --list

  # ===== Development Tasks =====

  benchmark:
    aliases: [bm]
    desc: Benchmark the code
    cmds:
      - go test -bench=. ./...

  lint:
    aliases: [l]
    desc: Format and lint code
    cmds:
      - gci write ./..
      - gofumpt -w .
      - golangci-lint run

  nil:
    aliases: [n]
    desc: "Run the static analysis techniques to catch Nil dereferences."
    cmds:
      - go tool nilaway -test=false ./...

  tests:
    aliases: [t]
    desc: Setup, run all tests, and then cleanup
    cmds:
      - task test-setup
      - go test ./...
      - task test-cleanup

  testscover:
    aliases: [c]
    desc: Setup, coverage all tests, and then cleanup
    cmds:
      - task test-setup
      - go test -count=1 -cover ./...
      - task test-cleanup

  testsrace:
    aliases: [r]
    desc: Setup, race detect all tests, and then cleanup
    cmds:
      - task test-setup
      - go test -count=1 -race ./...
      - task test-cleanup

  fuzz:
    aliases: [f]
    desc: Fuzzing specific tests
    cmds:
      - go test -fuzz=FuzzChecksum -fuzztime=30s ./pkg/dupe/parse
      - go test -fuzz=FuzzExtension -fuzztime=30s ./pkg/dupe/internal/archive
      - go test -fuzz=FuzzMIME -fuzztime=30s ./pkg/dupe/internal/archive
      - go test -fuzz=FuzzWindowsChk -fuzztime=30s ./pkg/cmd
      - go test -fuzz=FuzzSearchSummary -fuzztime=30s ./pkg/cmd

  # ===== Database Tasks =====

  db-info:
    aliases: [di]
    desc: Show database information
    cmds:
      - go {{.RUNRACE}} db

  db-backup:
    aliases: [db]
    desc: Create database backup
    cmds:
      - go {{.RUNRACE}} backup

  db-clean:
    aliases: [dc]
    desc: Clean stale database entries
    cmds:
      - go {{.RUNRACE}} clean

  # ===== Duplicate Detection Tasks =====

  test-dupe-file:
    aliases: [tf]
    desc: Test duplicate file detection
    cmds:
      - task test-setup
      - go {{.RUNRACE}} dupe {{.FILE}} {{.TEST_DATA}}
      - task test-cleanup

  test-dupe-dir:
    aliases: [td]
    desc: Test duplicate directory detection
    cmds:
      - task test-setup
      - go {{.RUNRACE}} dupe {{.TEST_DATA}} {{.TEST_DATA}}
      - task test-cleanup

  # ===== Search Tasks =====

  test-search:
    aliases: [ts]
    desc: Test search functionality
    cmds:
      - task test-setup
      - go {{.RUNRACE}} search "test" {{.TEST_DATA}}
      - task test-cleanup

  # ===== Setup/Cleanup Tasks =====

  test-setup:
    cmds:
      - mkdir -p {{.TEST_DIR}}
      - cp -r {{.TEST_DATA}}* {{.TEST_DIR}}/

  test-cleanup:
    cmds:
      - rm -rf {{.TEST_DIR}}

  # ===== Build/Release Tasks =====

  build:
    aliases: [b]
    desc: Build the application using Go
    cmds:
      - go build -o dupers .

  build-snapshot:
    aliases: [bs]
    desc: Create a release snapshot using GoReleaser
    cmds:
      - goreleaser release --snapshot --clean

  pkg-patch:
    aliases: [pp]
    silent: false
    desc: Update and apply patches to the app.
    cmds:
      - cmd: go get -u=patch -x
      - cmd: go mod verify

  pkg-update:
    aliases: [pu]
    silent: false
    desc: Update the app package dependencies.
    cmds:
      - cmd: go get -u -x
      - cmd: go mod verify
  # ===== Documentation Tasks =====

  docs:
    aliases: [gd]
    desc: Generate documentation
    cmds:
      - pkgsite -http localhost:8090
